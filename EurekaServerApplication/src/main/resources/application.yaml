server:
  port: 8761

spring:
  application:
    name: EurekaServerApplication

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://host.docker.internal:9411/api/v2/spans